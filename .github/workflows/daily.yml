name: daily-finance-digest

on:
  schedule:
    # 00:00 UTC = 台北時間 08:00。免費排程可能延遲 5~15 分鐘，屬正常。
    - cron: "0 0 * * *"
  workflow_dispatch: {}   # 允許手動按鈕觸發，用來測試

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main.py

      - name: Commit & push result
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/index.html data.json
          git commit -m "daily digest $(date -u +%F)" || echo "no changes to commit"
          git push
